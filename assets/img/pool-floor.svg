  <path d="M40 48 V160 M80 48 V160 M120 48 V160 M160 48 V160 M200 48 V160 M240 48 V160 M280 48 V160 M320 48 V160 M360 48 V160 M400 48 V160 M440 48 V160 M480 48 V160 M520 48 V160 M560 48 V160 M600 48 V160 M640 48 V160 M680 48 V160 M720 48 V160 M760 48 V160"/>
</g>
<!-- navy lane stripe with T-mark, classic pool bottom -->
<rect x="0" y="140" width="800" height="13" fill="#143b56" fill-opacity="0.85"/>
<rect x="392" y="104" width="13" height="49" fill="#143b56" fill-opacity="0.85"/>
<!-- drains -->
